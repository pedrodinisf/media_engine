# Alembic configuration for media_engine — used when running ``alembic``
# directly from the repository root. ``med db migrate`` (cli/db.py)
# builds its own Config in-process and does not read this file, so the
# package keeps working when installed as a wheel where alembic.ini
# isn't shipped.
#
# At runtime ``sqlalchemy.url`` is overridden by
# ``EngineConfig.resolve_cache_db_url`` (which honors
# ``MEDIA_ENGINE_DB_URL`` / config.toml). The static URL below is only
# used when running ``alembic`` directly with no env file.

[alembic]
# Migration files live inside the package so the wheel ships them.
script_location = media_engine/_alembic
prepend_sys_path = .
path_separator = os
sqlalchemy.url = sqlite+pysqlite:///./cache.db

# Logging — quiet by default; flip levels for debugging migrations.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
