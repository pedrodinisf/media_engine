# /etc/sysctl.d/99-hardening.conf — installed by deploy/hetzner/bootstrap.sh.
#
# Conservative network + kernel + filesystem hardening for a single
# public-Internet-facing VPS. Verbatim from the "Hardened Hetzner
# Ubuntu VPS Handbook" Appendix B. Safe for a Docker host: Docker
# manages its own bridge networking and does not need these knobs
# inverted. Does NOT enable `net.ipv4.ip_forward` — Docker enables that
# itself when it starts (in its own runtime config), and a plain
# Tailscale leaf node does not need it.

# --- Network ---
# Drop spoofed packets (RFC 3704 reverse-path filtering)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Don't accept source-routed packets
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Don't accept ICMP redirects (no MITM via gateway tricks)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Don't send ICMP redirects (we're not a router)
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Log martian packets (impossible source addresses)
net.ipv4.conf.all.log_martians = 1

# Ignore ICMP broadcast requests (smurf attack mitigation)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# SYN flood protection
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 2048
net.ipv4.tcp_synack_retries = 2
net.ipv4.tcp_syn_retries = 5

# TCP tuning for modern networks
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_keepalive_time = 300
net.core.default_qdisc = fq_codel
net.ipv4.tcp_congestion_control = bbr

# --- Kernel info-leak mitigations ---
kernel.dmesg_restrict = 1
kernel.kptr_restrict = 2
kernel.unprivileged_bpf_disabled = 1
net.core.bpf_jit_harden = 2

# --- File system ---
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2
fs.suid_dumpable = 0
