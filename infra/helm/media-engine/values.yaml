# media_engine — Helm values.

replicaCount: 1

image:
  repository: ghcr.io/anthropics/media-engine
  tag: ""        # falls back to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Postgres connection string the engine should use. Required for any
# production deployment — the default is a placeholder.
db:
  url: "postgresql+psycopg://media_engine:CHANGEME@postgres:5432/media_engine"

storage:
  permanentStore: "/var/lib/media_engine"
  minFreeGb: 5
  pvc:
    enabled: true
    storageClassName: ""
    size: 100Gi

# Extra non-secret env vars merged into the ConfigMap. Use this for
# tuning flags like MEDIA_ENGINE_GC_INTERVAL or MEDIA_ENGINE_NAMESPACE.
# For secrets, add to the Secret template instead.
#
# Web UI upload cap. `POST /acquire/upload` bounds incoming bodies at
# this many MB; bigger payloads abort with 413 mid-stream. Default
# 2048; bump for workflows that upload large source media.
#   MEDIA_ENGINE_MAX_UPLOAD_MB: "4096"
#
# Optional CORS allow-list for browser dev servers. Empty default =
# same-origin only (which is what bundled `/ui` users get). Pass a
# comma-separated list to open specific origins.
#   MEDIA_ENGINE_CORS_ORIGINS: "https://dev.example.com"
config:
  extraEnv: {}

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: media-engine.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 250m
    memory: 512Mi
