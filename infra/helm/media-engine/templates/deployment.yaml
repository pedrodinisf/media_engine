apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "media-engine.fullname" . }}
  labels:
    {{- include "media-engine.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "media-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "media-engine.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "media-engine.fullname" . }}-config
          env:
            - name: MEDIA_ENGINE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "media-engine.fullname" . }}-db
                  key: url
          ports:
            - name: http
              containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: store
              mountPath: {{ .Values.storage.permanentStore }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: store
          {{- if .Values.storage.pvc.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "media-engine.fullname" . }}-store
          {{- else }}
          emptyDir: {}
          {{- end }}
