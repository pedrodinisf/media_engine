apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "media-engine.fullname" . }}-config
  labels:
    {{- include "media-engine.labels" . | nindent 4 }}
data:
  # Non-secret runtime knobs. The DB URL stays in the matching Secret
  # so it isn't committed to a ConfigMap dump; everything below is
  # plain operational config that pods + ops can inspect freely.
  MEDIA_ENGINE_PERMANENT_STORE: {{ .Values.storage.permanentStore | quote }}
  MEDIA_ENGINE_LOG_FORMAT: "json"
  MEDIA_ENGINE_MIN_FREE_GB: {{ .Values.storage.minFreeGb | default 5 | quote }}
  {{- with .Values.config.extraEnv }}
  {{- range $k, $v := . }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
