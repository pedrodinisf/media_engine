# media_engine — local Postgres-backed deployment.
#
# Two services:
#   engine    — REST API + warm engine (container built from infra/docker/Dockerfile)
#   postgres  — pgvector/pgvector:pg16 (Postgres + pgvector extension)
#
# Storage uses two named Docker volumes (``engine-store`` for the
# artifact tree at MEDIA_ENGINE_PERMANENT_STORE, ``postgres-data`` for
# the database). To use host bind-mounts instead, replace the volume
# entries under ``services.engine.volumes`` / ``services.postgres.volumes``
# with ``./local/store:/var/lib/media_engine`` style mappings.
# Adjust ``MEDIA_ENGINE_DB_URL`` if you want to point at an external
# Postgres instead.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: media_engine
      POSTGRES_PASSWORD: media_engine_dev
      POSTGRES_DB: media_engine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media_engine -d media_engine"]
      interval: 5s
      timeout: 3s
      retries: 5

  engine:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MEDIA_ENGINE_LOG_FORMAT: json
      MEDIA_ENGINE_PERMANENT_STORE: /var/lib/media_engine
      MEDIA_ENGINE_DB_URL: postgresql+psycopg://media_engine:media_engine_dev@postgres:5432/media_engine
      MEDIA_ENGINE_MIN_FREE_GB: "1"
    ports:
      - "8000:8000"
    volumes:
      - engine-store:/var/lib/media_engine

volumes:
  postgres-data:
  engine-store:
