repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: pytest
        name: pytest -q
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
